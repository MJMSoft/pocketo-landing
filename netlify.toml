[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Astro 6 (this scaffold) pins engines to >=22.12.0, so build on Node 22.
  NODE_VERSION = "22"

[[redirects]]
  from = "/menu"
  to = "https://pocketo.ola.click/products"
  status = 302

[[redirects]]
  from = "/pedir"
  to = "https://pocketo.ola.click/"
  status = 302
